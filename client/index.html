<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="description" content="منصة متكاملة للعمل من المنزل وتحقيق الدخل" />
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Earn@Home" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <title>Earn at Home - اكسب من المنزل</title>
    <!-- Google Fonts - Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      if (import.meta.env.VITE_ANALYTICS_ENDPOINT && import.meta.env.VITE_ANALYTICS_WEBSITE_ID) {
        const script = document.createElement('script');
        script.async = true;
        script.defer = true;
        script.src = `${import.meta.env.VITE_ANALYTICS_ENDPOINT}/umami`;
        script.setAttribute('data-website-id', import.meta.env.VITE_ANALYTICS_WEBSITE_ID);
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
